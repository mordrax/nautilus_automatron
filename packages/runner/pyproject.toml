[project]
name = "nautilus-automatron-runner"
version = "0.1.0"
requires-python = ">=3.12,<3.14"
dependencies = [
    "nautilus_trader",
    "nautilus-ibapi==10.43.2",
    "nautilus-automatron-data @ file:///Users/mordrax/code/nautilus_automatron/packages/data",
    "protobuf==5.29.5",
    "pandas>=2.2.0",
    "pyarrow>=18.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "jupyter>=1.0.0",
    "ipykernel>=6.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "jupyter>=1.0.0",
    "ipykernel>=6.0.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["runner"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
