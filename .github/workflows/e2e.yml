name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install frontend dependencies
        run: bun install

      - name: Install backend dependencies
        run: cd packages/server && uv sync

      - name: Install Playwright browsers
        run: cd packages/client && bunx playwright install chromium --with-deps

      - name: Run E2E tests (headless)
        id: test
        continue-on-error: true
        run: cd packages/client && bun run test:e2e

      - name: Update snapshots if missing
        if: steps.test.outcome == 'failure'
        run: cd packages/client && bunx playwright test e2e/visual.spec.ts --project=headless --update-snapshots

      - name: Commit updated snapshots
        if: steps.test.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/client/e2e/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
            exit 1
          fi
          git commit -m "Update Linux screenshot baselines [skip ci]"
          git push

      - name: Re-run tests after snapshot update
        if: steps.test.outcome == 'failure'
        run: cd packages/client && bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/client/playwright-report/
          retention-days: 7
